services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatserv}
      POSTGRES_USER: ${POSTGRES_USER:-whatserv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ${WHATSERV_ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10

  whatsapp-worker:
    build: ./whatsapp-worker
    restart: unless-stopped
    env_file: ${WHATSERV_ENV_FILE:-.env}
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - whatsapp-sessions:/data/sessions
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  whatsapp-sessions:
