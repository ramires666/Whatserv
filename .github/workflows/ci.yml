name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest -q

  whatsapp-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: whatsapp-worker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: whatsapp-worker/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker compose --env-file .env.example config --quiet

  dockhand-manager:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: python -m unittest discover -s tools/dockhand-manager/tests -v
      - run: node --check tools/dockhand-manager/app.js
